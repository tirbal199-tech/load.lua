<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- هذا السطر هو المسؤول عن جعل حجم الموقع مناسباً للهاتف -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GT6 SYSTEM</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #121212;
            color: white;
        }
        .panel-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 500px;
            margin: auto;
        }
        input[type="number"] {
            padding: 20px;
            font-size: 20px;
            border-radius: 10px;
            border: none;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-primary {
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            border: none;
            border-radius: 10px;
            width: 100%;
        }
        .output-box {
            margin-top: 20px;
            padding: 20px;
            border: 2px solid #2575fc;
            font-size: 18px;
            background-color: #1e1e1e;
            border-radius: 10px;
            display: none; /* يظهر فقط عند النتيجة */
        }
    </style>
</head>
<body>

    <div class="panel-container">
        <h1 style="text-align: center;">GT6 SYSTEM</h1>
        <input type="number" id="playerId" placeholder="أدخل ID اللاعب">
        <button class="btn-primary" id="injectBtn">[+] INJECT GT6 MATRIX</button>
        <div id="resultBox" class="output-box"></div>
    </div>

    <!-- هذا السطر يربط ملف الجافا سكريبت -->
    <script type="module" src="script.js"></script>

</body>
</html>
